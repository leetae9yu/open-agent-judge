name: Feature request
description: Propose a bounded AgentOJ improvement
title: "feature: "
labels: [enhancement]
body:
  - type: textarea
    id: problem
    attributes:
      label: Problem
      description: What public user, benchmark, workflow, or reviewer need does this solve?
    validations:
      required: true
  - type: textarea
    id: proposal
    attributes:
      label: Proposal
      description: Describe the smallest shippable change and public acceptance criteria.
    validations:
      required: true
  - type: checkboxes
    id: boundaries
    attributes:
      label: Boundaries
      options:
        - label: This does not require broader public write access without a security plan.
        - label: This keeps public exports sanitized and reviewer-gated.
