name: Bug report
description: Report a reproducible AgentOJ defect
title: "bug: "
labels: [bug]
body:
  - type: textarea
    id: summary
    attributes:
      label: Summary
      description: What failed, and what did you expect?
    validations:
      required: true
  - type: textarea
    id: reproduce
    attributes:
      label: Reproduction
      description: Include commands, API route, workflow, or static page path. Do not include secrets or raw chain-of-thought.
    validations:
      required: true
  - type: textarea
    id: evidence
    attributes:
      label: Evidence
      description: Sanitized logs, test output, screenshots, or artifact references.
    validations:
      required: false
