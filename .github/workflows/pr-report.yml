name: AgentOJ PR Report

on:
  workflow_run:
    workflows: [AgentOJ PR Judge]
    types: [completed]
  workflow_dispatch:
    inputs:
      run_id:
        description: Workflow run id containing agentoj-pr-judge-summary
        required: true

permissions:
  actions: read
  contents: write
  issues: write

jobs:
  report:
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - name: Checkout trusted reporter code
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5
        with:
          ref: ${{ github.event.repository.default_branch }}
          persist-credentials: false

      - name: Set up Node.js
        uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020
        with:
          node-version: '22'

      - name: Install dependencies
        run: npm ci --ignore-scripts

      - name: Download sanitized summary artifact
        uses: actions/github-script@f28e40c7f34bde8b3046d885e986cb6290c5673b
        env:
          RUN_ID: ${{ github.event.workflow_run.id || inputs.run_id }}
        with:
          script: |
            const fs = require('node:fs');
            const run_id = Number(process.env.RUN_ID);
            const { owner, repo } = context.repo;
            const artifacts = await github.paginate(github.rest.actions.listWorkflowRunArtifacts, { owner, repo, run_id });
            const summary = artifacts.find((artifact) => artifact.name === 'agentoj-pr-judge-summary');
            if (!summary) throw new Error('sanitized summary artifact not found');
            if (summary.size_in_bytes > 64 * 1024) throw new Error('sanitized summary artifact is oversized');
            const download = await github.rest.actions.downloadArtifact({ owner, repo, artifact_id: summary.id, archive_format: 'zip' });
            fs.mkdirSync('artifacts/report', { recursive: true });
            fs.writeFileSync('artifacts/report/summary.zip', Buffer.from(download.data));

      - name: Validate sanitized summary schema
        run: |
          unzip -p artifacts/report/summary.zip pr-judge-summary.json > artifacts/report/pr-judge-summary.json
          node --experimental-strip-types --input-type=module <<'NODE'
          import { readFileSync } from 'node:fs';
          import { getImplementedProblemCatalog, listImplementedProblems, validateSanitizedPrJudgeSummary } from './src/index.ts';
          const summary = JSON.parse(readFileSync('artifacts/report/pr-judge-summary.json', 'utf8'));
          const options = {
            enabledProblemIds: listImplementedProblems().map((problem) => problem.id),
            enabledAdapterIds: listImplementedProblems().map((problem) => getImplementedProblemCatalog(problem.id)?.adapter.id).filter(Boolean),
          };
          const validation = validateSanitizedPrJudgeSummary(summary, options);
          if (!validation.ok) throw new Error(validation.issues.map((issue) => issue.code).join(', '));
          if (JSON.stringify(summary).length > 65536) throw new Error('summary json is oversized');
          console.log(JSON.stringify({ ok: true, status: summary.status, passFail: summary.passFail }));
          NODE

      - name: Publish passed result to static leaderboard
        if: ${{ github.event.workflow_run.conclusion == 'success' || inputs.run_id }}
        uses: actions/github-script@f28e40c7f34bde8b3046d885e986cb6290c5673b
        with:
          script: |
            const fs = require('node:fs');
            const summary = JSON.parse(fs.readFileSync('artifacts/report/pr-judge-summary.json', 'utf8'));
            if (summary.status !== 'passed' || summary.passFail !== 'pass') {
              core.info(`Skipping leaderboard update for status=${summary.status}`);
              return;
            }

            const { owner, repo } = context.repo;
            const path = 'web/data/leaderboard.json';
            const current = await github.rest.repos.getContent({ owner, repo, path, ref: 'main' });
            if (Array.isArray(current.data)) throw new Error('leaderboard path resolved to a directory');
            const rows = JSON.parse(Buffer.from(current.data.content, current.data.encoding).toString('utf8'));
            if (!Array.isArray(rows)) throw new Error('leaderboard json must be an array');

            const entry = {
              id: summary.resultHash,
              problemId: summary.problemId,
              submissionId: summary.submissionId,
              passFail: summary.passFail,
              runtimeMs: Number(summary.runtimeMs),
              filesChanged: Number(summary.patchStats.filesChanged),
              locAdded: Number(summary.patchStats.locAdded),
              locDeleted: Number(summary.patchStats.locDeleted),
              eligibilityStatus: 'eligible'
            };
            const next = [entry, ...rows.filter((row) => row.id !== entry.id)].slice(0, 100);
            const content = Buffer.from(`${JSON.stringify(next, null, 2)}\n`, 'utf8').toString('base64');
            await github.rest.repos.createOrUpdateFileContents({
              owner,
              repo,
              path,
              message: `Record OAJ scored result for ${summary.submissionId}`,
              content,
              sha: current.data.sha,
              branch: 'main'
            });

      - name: Comment sanitized result on PR
        if: ${{ github.event.workflow_run.event == 'pull_request' && github.event.workflow_run.pull_requests[0].number }}
        uses: actions/github-script@f28e40c7f34bde8b3046d885e986cb6290c5673b
        with:
          script: |
            const fs = require('node:fs');
            const summary = JSON.parse(fs.readFileSync('artifacts/report/pr-judge-summary.json', 'utf8'));
            const pr = context.payload.workflow_run.pull_requests[0].number;
            const escapeMarkdown = (value) => String(value)
              .replace(/[\\`*_{}\[\]<>()#+.!|>-]/g, '\\$&')
              .slice(0, 240);
            const body = [
              '### AgentOJ judge summary',
              `Submission: ${escapeMarkdown(summary.submissionId)}`,
              `Problem: ${escapeMarkdown(summary.problemId)}`,
              `Status: ${escapeMarkdown(summary.status)}`,
              `Result: ${escapeMarkdown(summary.passFail)}`,
              `Runtime: ${Number(summary.runtimeMs)} ms`,
              `Patch stats: ${Number(summary.patchStats.filesChanged)} files, +${Number(summary.patchStats.locAdded)}/-${Number(summary.patchStats.locDeleted)}`,
              ...summary.validationMessages.map((message) => `- ${escapeMarkdown(message)}`),
            ].join('\n');
            await github.rest.issues.createComment({ ...context.repo, issue_number: pr, body });
