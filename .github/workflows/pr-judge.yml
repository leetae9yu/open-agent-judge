name: AgentOJ PR Judge

on:
  pull_request:
    types: [opened, synchronize, reopened, ready_for_review]
    paths:
      - '.agentoj/submission.json'
      - '.agentoj/submission.patch'
      - '.github/workflows/pr-judge.yml'
      - 'src/**'
      - 'tests/**'
      - 'fixtures/**'
      - 'package.json'
      - 'package-lock.json'
  workflow_dispatch:
    inputs:
      pr_head_sha:
        description: 'Trusted PR head SHA for maintainer-triggered secret-backed reruns'
        required: true
        type: string
      swebench_instance_id:
        description: 'Allowlisted SWE-bench instance id for maintainer-triggered runs'
        required: true
        type: string

permissions:
  contents: read

concurrency:
  group: agentoj-pr-judge-${{ github.event.pull_request.number || inputs.pr_head_sha }}
  cancel-in-progress: true

jobs:
  judge:
    if: ${{ github.event_name != 'pull_request' || !github.event.pull_request.draft }}
    runs-on: ubuntu-latest
    timeout-minutes: 45
    steps:
      - name: Checkout trusted judge code
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5
        with:
          ref: ${{ github.event.repository.default_branch }}
          persist-credentials: false

      - name: Checkout PR submission files only
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5
        with:
          ref: ${{ github.event.pull_request.head.sha || inputs.pr_head_sha }}
          path: pr-submission
          sparse-checkout: .agentoj
          sparse-checkout-cone-mode: false
          persist-credentials: false

      - name: Set up Node.js
        uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020
        with:
          node-version: '22'

      - name: Install trusted dependencies
        run: npm ci --ignore-scripts

      - name: Require docker sandbox for untrusted judging
        run: docker version

      - name: Smoke test Docker sandbox against trusted fixture
        run: |
          node --experimental-strip-types src/cli.ts run humaneval-001 \
            --patch .github/agentoj-smoke/humaneval-001-pass.diff \
            --sandbox docker

      - name: Install pinned SWE-bench harness
        if: ${{ github.event_name == 'workflow_dispatch' }}
        run: |
          git clone --filter=blob:none https://github.com/SWE-bench/SWE-bench.git /tmp/swe-bench
          cd /tmp/swe-bench
          git checkout f7bbbb2ccdf479001d6467c9e34af59e44a840f9
          test "$(git rev-parse HEAD)" = "f7bbbb2ccdf479001d6467c9e34af59e44a840f9"
          python3 -m pip install --user -e .

      - name: Pull pinned SWE-bench harness image
        if: ${{ github.event_name == 'workflow_dispatch' }}
        run: |
          docker pull swebench/sweb.eval.x86_64.astropy_1776_astropy-12907@sha256:f3f63bb87d581c0e7b47f900dd82165b71040e1758d3c29e915e2b18da9baf63
          docker image inspect swebench/sweb.eval.x86_64.astropy_1776_astropy-12907@sha256:f3f63bb87d581c0e7b47f900dd82165b71040e1758d3c29e915e2b18da9baf63

      - name: Materialize private descriptor secret to path
        if: ${{ github.event_name == 'workflow_dispatch' }}
        env:
          AGENTOJ_PRIVATE_ORACLE_DESCRIPTOR_JSON: ${{ secrets.AGENTOJ_PRIVATE_ORACLE_DESCRIPTOR_JSON }}
        run: |
          test -n "$AGENTOJ_PRIVATE_ORACLE_DESCRIPTOR_JSON"
          descriptor_dir="$RUNNER_TEMP/agentoj-private-descriptor"
          install -d -m 700 "$descriptor_dir"
          descriptor_path="$descriptor_dir/descriptor.json"
          umask 077
          printf '%s' "$AGENTOJ_PRIVATE_ORACLE_DESCRIPTOR_JSON" > "$descriptor_path"
          test -s "$descriptor_path"
          echo "AGENTOJ_PRIVATE_ORACLE_DESCRIPTOR_PATH=$descriptor_path" >> "$GITHUB_ENV"
      - name: Validate SWE-bench private descriptor for submitted problem
        if: ${{ github.event_name == 'workflow_dispatch' }}
        run: |
          test -n "$AGENTOJ_PRIVATE_ORACLE_DESCRIPTOR_PATH"
          node --experimental-strip-types --input-type=module <<'NODE'
          import { readFileSync } from 'node:fs';
          import { getImplementedProblemCatalog, selectCanonicalPrivateOracleDescriptor } from './src/index.ts';
          const submission = JSON.parse(readFileSync('pr-submission/.agentoj/submission.json', 'utf8'));
          const entry = getImplementedProblemCatalog(submission.problemId);
          if (!entry) throw new Error('unknown submitted problem id');
          const descriptor = JSON.parse(readFileSync(process.env.AGENTOJ_PRIVATE_ORACLE_DESCRIPTOR_PATH ?? '', 'utf8'));
          const selected = selectCanonicalPrivateOracleDescriptor({
            problemId: entry.problem.id,
            benchmarkId: entry.benchmark.id,
            adapterId: entry.adapter.id,
            upstreamTaskId: entry.problem.upstreamTaskId,
            expectedOracleDescriptorHash: entry.problem.oracleMetadata?.oracleDescriptorHash
          }, descriptor);
          if (!selected) throw new Error('private descriptor does not match submitted problem');
          NODE
      - name: Judge sanitized PR submission with trusted code
        env:
          AGENTOJ_SWEBENCH_HARNESS_PATH: ${{ github.event_name == 'workflow_dispatch' && '/tmp/swe-bench' || '' }}
        run: |
          mkdir -p artifacts
          test -f pr-submission/.agentoj/submission.json
          test -f pr-submission/.agentoj/submission.patch
          node --experimental-strip-types src/cli.ts judge-pr-submission \
            --submission pr-submission/.agentoj/submission.json \
            --patch pr-submission/.agentoj/submission.patch \
            --summary-out artifacts/pr-judge-summary.json \
            --expected-pr-head-sha ${{ github.event.pull_request.head.sha || inputs.pr_head_sha }} \
            --instance-id ${{ inputs.swebench_instance_id || '' }} \
            --trigger ${{ github.event_name }} \
            --sandbox docker

      - name: Upload sanitized judge summary only
        if: always()
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02
        with:
          name: agentoj-pr-judge-summary
          path: artifacts/pr-judge-summary.json
          if-no-files-found: error
          retention-days: 7
