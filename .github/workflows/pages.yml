name: AgentOJ Pages Publish

on:
  push:
    branches: [main]
    paths:
      - 'web/**'
      - 'src/**'
      - 'fixtures/**'
      - 'package.json'
      - 'package-lock.json'
      - '.github/workflows/pages.yml'
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: agentoj-pages
  cancel-in-progress: false


jobs:
  publish:
    if: ${{ github.ref == 'refs/heads/main' }}
    runs-on: ubuntu-latest
    timeout-minutes: 10
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Checkout protected source
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5
        with:
          ref: main
          persist-credentials: false

      - name: Set up Node.js
        uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020
        with:
          node-version: '22'

      - name: Install dependencies
        run: npm ci --ignore-scripts

      - name: Validate committed static public data
        run: |
          node --input-type=module <<'NODE'
          import { readFileSync } from 'node:fs';
          for (const file of ['problems.json', 'leaderboard.json', 'recordings.json', 'memory.json', 'registry.json']) {
            const parsed = JSON.parse(readFileSync(`web/data/${file}`, 'utf8'));
            if (!Array.isArray(parsed)) throw new Error(`${file} must be a public array`);
          }
          NODE

      - name: Configure Pages
        uses: actions/configure-pages@983d7736d9b0ae728b81ab479565c72886d7745b

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@56afc609e74202658d3ffba0e8f6dda462b719fa
        with:
          path: web

      - name: Deploy Pages
        id: deployment
        uses: actions/deploy-pages@d6db90164ac5ed86f2b6aed7e0febac5b3c0c03e
